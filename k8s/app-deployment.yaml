apiVersion: apps/v1
kind: Deployment
metadata:
  name: movie-ticketing-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: movie-ticketing-app
  template:
    metadata:
      labels:
        app: movie-ticketing-app
    spec:
      initContainers:
        - name: migrate
          image: movie_ticketing_migrate:v1
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "postgres://postgres:$(DB_PASSWORD)@postgres-service:5432/movie_ticketing?sslmode=disable"
            - "up"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: movie-ticketing-secret
                  key: DB_PASSWORD
      containers:
        - name: app-container
          image: movie_ticketing_app:v1
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: movie-ticketing-configmap
            - secretRef:
                name: movie-ticketing-secret
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /movies
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
